server:
  forward-headers-strategy: native

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:aws-parameterstore:/tradex/${spring.profiles.active}/
  cloud:
    aws:
      parameterstore:
        region: ap-northeast-2

  application:
    name: tradex-server

  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${jpa.ddl-auto:none}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${oauth2.google.client-id}
            client-secret: ${oauth2.google.client-secret}
            scope:
              - email
              - profile
          kakao:
            client-id: ${oauth2.kakao.client-id}
            client-secret: ${oauth2.kakao.client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${mail.username}
    password: ${mail.password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${redis.host:localhost}
      port: ${redis.port:6379}
  ai:
    openai:
      api-key: ${openai.api-key}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000

jwt:
  secret: ${jwt.secret}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

solapi:
  api-key: ${solapi.api-key}
  api-secret: ${solapi.api-secret}
  sender-number: ${solapi.sender-number}

app:
  oauth2:
    redirect-uri: ${app.oauth2.redirect-uri}
    allowed-redirect-uris: ${app.oauth2.allowed-redirect-uris}
  cors:
    allowed-origins: ${app.cors.allowed-origins}
  password-reset:
    base-url: ${app.password-reset.base-url}

encryption:
  secret-key: ${encryption.secret-key}

management:
  health:
    mail:
      enabled: false

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

toss:
  client-key: ${toss.client-key}
  secret-key: ${toss.secret-key}

aws:
  s3:
    bucket-name: tradex-files-bucket
    region: ap-northeast-2
    access-key: ${aws.s3.access-key}
    secret-key: ${aws.s3.secret-key}

